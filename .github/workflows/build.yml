name: Build

on:
  push:
    branches: [ "main" ]
    tags:     [ "v*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ---------------------------------------------------------------------------
  # Windows builds (static, x64 / x86 / arm64)
  # ---------------------------------------------------------------------------
  build-windows:
    name: Windows (${{ matrix.arch }})
    runs-on: windows-2022
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            triplet: x64-windows-static
            cmake_arch: x64
            artifact: RdpBridge-windows-x64
          - arch: x86
            triplet: x86-windows-static
            cmake_arch: Win32
            artifact: RdpBridge-windows-x86
          - arch: arm64
            triplet: arm64-windows-static
            cmake_arch: ARM64
            artifact: RdpBridge-windows-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up vcpkg
        run: |
          git clone --depth=1 https://github.com/microsoft/vcpkg "${{ github.workspace }}/vcpkg"
          "${{ github.workspace }}/vcpkg/bootstrap-vcpkg.bat" -disableMetrics
        shell: cmd

      - name: Install FreeRDP via vcpkg
        run: |
          "${{ github.workspace }}/vcpkg/vcpkg.exe" install freerdp:${{ matrix.triplet }} openssl:${{ matrix.triplet }}
        shell: cmd

      - name: Configure (Release, static)
        run: |
          cmake -S . -B build `
            -G "Visual Studio 17 2022" -A ${{ matrix.cmake_arch }} `
            -DCMAKE_BUILD_TYPE=Release `
            -DRDPBRIDGE_BUILD_EXAMPLES=ON `
            -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }} `
            -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake"
        shell: pwsh

      - name: Build
        run: cmake --build build --config Release
        shell: pwsh

      - name: Verify DLL exists
        run: |
          if (!(Test-Path "build/Release/RdpBridge.dll")) {
            Write-Error "RdpBridge.dll not found"
            exit 1
          }
          Get-Item "build/Release/RdpBridge.dll"
        shell: pwsh

      # -----------------------------------------------------------------------
      # Package the SDK: header + DLL + import library
      # -----------------------------------------------------------------------
      - name: Package SDK (Windows ${{ matrix.arch }})
        run: |
          New-Item -ItemType Directory -Force sdk-windows/include | Out-Null
          New-Item -ItemType Directory -Force sdk-windows/lib     | Out-Null
          New-Item -ItemType Directory -Force sdk-windows/bin     | Out-Null
          Copy-Item include/rdp_bridge.h            sdk-windows/include/
          Copy-Item build/Release/RdpBridge.dll     sdk-windows/bin/
          Copy-Item build/Release/RdpBridge.lib     sdk-windows/lib/ -ErrorAction SilentlyContinue
          Compress-Archive -Path sdk-windows/* -DestinationPath ${{ matrix.artifact }}.zip
        shell: pwsh

      - name: Upload artifact (Windows ${{ matrix.arch }})
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

  # ---------------------------------------------------------------------------
  # GitHub Release (tag pushes only)
  # ---------------------------------------------------------------------------
  release:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [ build-windows ]
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download Windows x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: RdpBridge-windows-x64

      - name: Download Windows x86 artifact
        uses: actions/download-artifact@v4
        with:
          name: RdpBridge-windows-x86

      - name: Download Windows arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: RdpBridge-windows-arm64

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            RdpBridge-windows-x64.zip
            RdpBridge-windows-x86.zip
            RdpBridge-windows-arm64.zip
          generate_release_notes: true
